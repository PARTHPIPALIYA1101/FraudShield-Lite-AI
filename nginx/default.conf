# ============================================================================
# FraudShield Lite AI — single front door (reverse proxy).
# ----------------------------------------------------------------------------
# One public port (:80) fronts the whole stack so the browser only ever talks
# to one origin — no CORS, no per-service ports to expose:
#   /        -> Next.js frontend  (frontend:3000)
#   /api/    -> FastAPI backend    (backend:8000, the /api prefix is stripped)
#   /api/ws/ -> same, upgraded to a WebSocket for the live alert feed
#
# Matches the frontend build config NEXT_PUBLIC_API_URL=/api,
# NEXT_PUBLIC_WS_URL=/api (see frontend/.env.local + docker-compose.yml).
# ============================================================================

# Named upstreams resolve over the compose network by service name.
upstream fraudshield_backend {
    server backend:8000;
}
upstream fraudshield_frontend {
    server frontend:3000;
}

# Map the Upgrade header so a plain request stays keep-alive while a WebSocket
# handshake gets "Connection: upgrade" (required for /api/ws/alerts).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Allow large-ish JSON bodies (chat history, transaction payloads).
    client_max_body_size 5m;

    # --- API + WebSocket ---------------------------------------------------
    # Strip the leading /api before proxying: the browser hits /api/transactions
    # but FastAPI serves /transactions. The trailing slashes on both location
    # and proxy_pass are what perform the prefix rewrite.
    location /api/ {
        proxy_pass http://fraudshield_backend/;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade (harmless for regular REST calls).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Streaming endpoints (/api/chat, /api/ws/alerts) must not be buffered.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # --- Frontend (everything else) ---------------------------------------
    location / {
        proxy_pass http://fraudshield_frontend;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js dev/HMR and any client upgrades.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
